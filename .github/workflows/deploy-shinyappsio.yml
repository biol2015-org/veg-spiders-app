name: Deploy to shinyapps.io
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: r-lib/actions/setup-r@v2
      - name: Install libcurl
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev
      - name: Install rsconnect and dependencies
        run: |
          install.packages(c('rsconnect', 'remotes'))
          # expect other pkgs from app rmd will be needed here
        shell: Rscript {0}
      - name: Deploy to shinyapps.io
        run: |
          rsconnect::setAccountInfo(name="${{ secrets.SHINY_ACC_NAME }}", token="${{ secrets.SHINY_TOKEN }}", secret="${{ secrets.SHINY_SECRET }}")
          rsconnect::deployApp(appName = 'veg-spiders-app')
        shell: Rscript {0}
