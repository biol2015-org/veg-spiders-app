name: Deploy to shinyapps.io
on:
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: r-lib/actions/setup-r@v2
      - name: Install libcurl
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev
      - name: Install rsconnect and dependencies
        run: |
          install.packages(c('rsconnect', 'remotes', 'readxl', 'esquisse', 'shiny'))
        shell: Rscript {0}
      - name: Deploy to shinyapps.io
        run: |
          rsconnect::setAccountInfo(name="${{ secrets.SHINY_ACC_NAME }}", token="${{ secrets.SHINY_TOKEN }}", secret="${{ secrets.SHINY_SECRET }}")
          rsconnect::deployApp(appName = 'veg-spiders-app', appFiles = c("veg-spiders-app.rmd", "data/processed/BIOL2015-M2-2024_plot-level.xlsx"), forceUpdate = TRUE)
        shell: Rscript {0}
